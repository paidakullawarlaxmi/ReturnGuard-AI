{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px;">
    <h2>Contact Us</h2>
    <p style="margin-bottom: 2rem;">Get in touch with the ReturnGuard AI support team.</p>

    <div style="text-align: left; margin: 1.5rem 0;">
        <div class="detail-row">
            <span>Email</span>
            <span>support@returnguardai.com</span>
        </div>
        <div class="detail-row">
            <span>Phone</span>
            <span>+91 9876543210</span>
        </div>
        <div class="detail-row">
            <span>Location</span>
            <span>Hyderabad, India</span>
        </div>
        <div class="detail-row">
            <span>GitHub</span>
            <span><a href="https://github.com/yourname" target="_blank" style="color: var(--primary); text-decoration: none;">github.com/yourname</a></span>
        </div>
        <div class="detail-row">
            <span>LinkedIn</span>
            <span><a href="https://linkedin.com/in/yourname" target="_blank" style="color: var(--primary); text-decoration: none;">linkedin.com/in/yourname</a></span>
        </div>
    </div>

    <a href="/" class="btn" style="margin-top: 1.5rem; display: block;">Back to Home</a>
</div>
{% endblock %}
