{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="card-title">🔍 Return Fraud Prediction</h2>
    <p class="card-subtitle">Enter the transaction parameters below to compute AI fraud classification and risk assessment metrics.</p>

    <form action="/result" method="POST">
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" placeholder="Number of items returned (e.g. 25)" min="1" required>
        </div>

        <div class="form-group">
            <label for="price">Unit Price ($)</label>
            <input type="number" step="0.01" id="price" name="price" placeholder="Price per unit item in USD (e.g. 5.00)" min="0.01" required>
        </div>

        <div class="form-group">
            <label for="age">Customer Age</label>
            <input type="number" id="age" name="age" placeholder="Age of the customer account holder (e.g. 12)" min="1" required>
        </div>

        <div class="form-group" style="margin-bottom: 28px;">
            <label for="returns">Previous Returns</label>
            <input type="number" id="returns" name="returns" placeholder="Historical completed return count (e.g. 20)" min="0" required>
        </div>

        <button type="submit" style="width: 100%;">
            🛡️ Predict Return Fraud
        </button>
    </form>
</div>
{% endblock %}
