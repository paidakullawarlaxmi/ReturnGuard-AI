{% extends "base.html" %}

{% block content %}

<div class="card">

    <h2>Return Fraud Prediction</h2>

    <p>Enter transaction details below to run real-time AI return fraud prediction.</p>

    <form action="/result" method="POST">

        <label>Quantity</label>
        <input type="number" name="quantity" placeholder="Enter Quantity" required>

        <br><br>

        <label>Unit Price ($)</label>
        <input type="number" step="0.01" name="price" placeholder="Enter Price" required>

        <br><br>

        <label>Customer Age</label>
        <input type="number" name="age" placeholder="Enter Age" required>

        <br><br>

        <label>Previous Returns</label>
        <input type="number" name="returns" placeholder="Enter Previous Returns" required>

        <br><br>

        <button type="submit">
            Predict Fraud
        </button>

    </form>

</div>

{% endblock %}
